<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Richyards Admin Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            line-height: 1.6;
        }
        
        /* Login Container */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
            padding: 20px;
        }
        .login-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid #c9a227;
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 45px -10px rgba(0,0,0,0.5);
        }
        .login-box h2 {
            color: #c9a227;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .login-box p {
            color: #888;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .login-box input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(201,162,39,0.3);
            border-radius: 12px;
            color: white;
            font-size: 14px;
            transition: 0.3s;
        }
        .login-box input:focus {
            outline: none;
            border-color: #c9a227;
            background: rgba(255,255,255,0.15);
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(95deg, #c9a227, #f5e6a3);
            color: #0a0a0a;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 15px;
            font-size: 16px;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(201,162,39,0.4);
        }
        .error-msg {
            color: #ff6b6b;
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
        }
        
        /* Dashboard Container */
        .dashboard-container {
            display: flex;
            min-height: 100vh;
        }
        
        /* Sidebar */
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #0b5d1e 0%, #094a18 100%);
            border-right: 2px solid #c9a227;
            padding: 30px 20px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        .sidebar-logo {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(201,162,39,0.3);
        }
        .sidebar-logo h2 {
            color: #c9a227;
            font-size: 24px;
            margin-bottom: 5px;
        }
        .sidebar-logo p {
            color: #f5e6a3;
            font-size: 11px;
            letter-spacing: 2px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            color: #ddd;
        }
        .nav-item:hover, .nav-item.active {
            background: rgba(201,162,39,0.2);
            color: #c9a227;
        }
        .nav-item i {
            width: 20px;
            height: 20px;
        }
        
        /* Main Content */
        .main-content {
            margin-left: 280px;
            flex: 1;
            padding: 30px;
        }
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(201,162,39,0.2);
        }
        .dashboard-header h1 {
            font-size: 28px;
            color: #c9a227;
        }
        .logout-btn {
            background: rgba(220,38,38,0.2);
            border: 1px solid #dc2626;
            color: #dc2626;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.3s;
        }
        .logout-btn:hover {
            background: #dc2626;
            color: white;
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(201,162,39,0.2);
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            transition: 0.3s;
        }
        .stat-card:hover {
            border-color: #c9a227;
            transform: translateY(-5px);
        }
        .stat-number {
            font-size: 42px;
            font-weight: 800;
            color: #c9a227;
            display: block;
        }
        .stat-label {
            font-size: 13px;
            color: #aaa;
            margin-top: 8px;
        }
        
        /* Data Tables */
        .data-table {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        th {
            color: #c9a227;
            font-weight: 600;
            font-size: 13px;
        }
        td {
            font-size: 14px;
            color: #ddd;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .status-new { background: rgba(201,162,39,0.2); color: #c9a227; }
        .status-read { background: rgba(76,175,80,0.2); color: #4caf50; }
        .status-replied { background: rgba(33,150,243,0.2); color: #2196f3; }
        .status-contacted { background: rgba(76,175,80,0.2); color: #4caf50; }
        .status-qualified { background: rgba(33,150,243,0.2); color: #2196f3; }
        .status-closed { background: rgba(156,163,175,0.2); color: #9ca3af; }
        
        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            margin: 0 3px;
            color: #c9a227;
        }
        .view-btn:hover { color: #f5e6a3; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        @media (max-width: 768px) {
            .sidebar { width: 80px; padding: 20px 10px; }
            .sidebar span { display: none; }
            .sidebar-logo h2 { font-size: 16px; }
            .sidebar-logo p { display: none; }
            .main-content { margin-left: 80px; padding: 20px; }
            .nav-item { justify-content: center; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="loginContainer" class="login-container">
        <div class="login-box">
            <h2>🔐 Admin Login</h2>
            <p>Enter your credentials to access the dashboard</p>
            <input type="text" id="username" placeholder="Username" autocomplete="off">
            <input type="password" id="password" placeholder="Password">
            <button class="login-btn" onclick="login()">Access Dashboard</button>
            <div id="loginError" class="error-msg"></div>
        </div>
    </div>
    
    <div id="dashboardContainer" style="display:none;">
        <div class="dashboard-container">
            <div class="sidebar">
                <div class="sidebar-logo">
                    <h2>RICHYARDS</h2>
                    <p>ADMIN</p>
                </div>
                <div class="nav-item active" onclick="showTab('contacts')">
                    <i data-lucide="mail"></i><span> Contacts</span>
                </div>
                <div class="nav-item" onclick="showTab('leads')">
                    <i data-lucide="trending-up"></i><span> Investment Leads</span>
                </div>
                <div class="nav-item" onclick="showTab('stats')">
                    <i data-lucide="bar-chart-2"></i><span> Statistics</span>
                </div>
            </div>
            <div class="main-content">
                <div class="dashboard-header">
                    <h1 id="pageTitle">Contact Submissions</h1>
                    <button class="logout-btn" onclick="logout()">Logout</button>
                </div>
                
                <div id="statsTab" class="tab-content">
                    <div class="stats-grid" id="statsGrid"></div>
                </div>
                
                <div id="contactsTab" class="tab-content active">
                    <div class="data-table">
                        <table>
                            <thead>
                                <tr><th>ID</th><th>Name</th><th>Email</th><th>Subject</th><th>Message</th><th>Status</th><th>Date</th><th>Actions</th></tr>
                            </thead>
                            <tbody id="contactsTable"></tbody>
                        </table>
                    </div>
                </div>
                
                <div id="leadsTab" class="tab-content">
                    <div class="data-table">
                        <table>
                            <thead>
                                <tr><th>ID</th><th>Name</th><th>Email</th><th>Phone</th><th>Amount</th><th>Sector</th><th>Status</th><th>Date</th><th>Actions</th></tr>
                            </thead>
                            <tbody id="leadsTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = 'https://richyards-api.onrender.com/api';
        let token = null;
        
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            document.getElementById('loginError').innerText = '';
            
            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (data.success) {
                    token = data.token;
                    document.getElementById('loginContainer').style.display = 'none';
                    document.getElementById('dashboardContainer').style.display = 'block';
                    await loadStats();
                    await loadContacts();
                    await loadLeads();
                    lucide.createIcons();
                } else {
                    document.getElementById('loginError').innerText = 'Invalid credentials';
                }
            } catch(err) {
                document.getElementById('loginError').innerText = 'Connection error: ' + err.message;
            }
        }
        
        function logout() {
            token = null;
            document.getElementById('loginContainer').style.display = 'flex';
            document.getElementById('dashboardContainer').style.display = 'none';
        }
        
        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(`${tab}Tab`).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            event.target.closest('.nav-item').classList.add('active');
            const titles = { contacts: 'Contact Submissions', leads: 'Investment Leads', stats: 'Statistics' };
            document.getElementById('pageTitle').innerText = titles[tab];
            if (tab === 'contacts') loadContacts();
            if (tab === 'leads') loadLeads();
            if (tab === 'stats') loadStats();
        }
        
        async function loadStats() {
            try {
                const res = await fetch(`${API_URL}/dashboard/stats`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('statsGrid').innerHTML = `
                        <div class="stat-card"><span class="stat-number">${data.data.totalContacts || 0}</span><div class="stat-label">Contact Messages</div></div>
                        <div class="stat-card"><span class="stat-number">${data.data.totalLeads || 0}</span><div class="stat-label">Investment Leads</div></div>
                        <div class="stat-card"><span class="stat-number">${data.data.totalPosts || 0}</span><div class="stat-label">Blog Posts</div></div>
                    `;
                }
            } catch(e) { console.error(e); }
        }
        
        async function loadContacts() {
            try {
                const res = await fetch(`${API_URL}/contact`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success && data.data) {
                    document.getElementById('contactsTable').innerHTML = data.data.map(c => `
                        <tr>
                            <td>${c.id}</td>
                            <td>${escapeHtml(c.name)}</td>
                            <td>${escapeHtml(c.email)}</td>
                            <td>${escapeHtml(c.subject || 'General')}</td>
                            <td>${escapeHtml(c.message.substring(0, 60))}${c.message.length > 60 ? '...' : ''}</td>
                            <td><span class="status-badge status-${c.status}">${c.status}</span></td>
                            <td>${new Date(c.created_at).toLocaleDateString()}</td>
                            <td><button class="action-btn view-btn" onclick="viewContact(${c.id})" title="View"><i data-lucide="eye"></i></button></td>
                        </tr>
                    `).join('');
                    lucide.createIcons();
                }
            } catch(e) { console.error(e); }
        }
        
        async function loadLeads() {
            try {
                const res = await fetch(`${API_URL}/lead`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success && data.data) {
                    document.getElementById('leadsTable').innerHTML = data.data.map(l => `
                        <tr>
                            <td>${l.id}</td>
                            <td>${escapeHtml(l.name)}</td>
                            <td>${escapeHtml(l.email)}</td>
                            <td>${l.phone || '-'}</td>
                            <td>${l.investment_amount || '-'}</td>
                            <td>${l.sector || '-'}</td>
                            <td><span class="status-badge status-${l.status}">${l.status}</span></td>
                            <td>${new Date(l.created_at).toLocaleDateString()}</td>
                            <td><button class="action-btn view-btn" onclick="viewLead(${l.id})" title="View"><i data-lucide="eye"></i></button></td>
                        </tr>
                    `).join('');
                    lucide.createIcons();
                }
            } catch(e) { console.error(e); }
        }
        
        async function viewContact(id) {
            const res = await fetch(`${API_URL}/contact`, { headers: { 'Authorization': `Bearer ${token}` } });
            const data = await res.json();
            const contact = data.data.find(c => c.id === id);
            if (contact) {
                alert(`From: ${contact.name}\nEmail: ${contact.email}\nSubject: ${contact.subject}\n\nMessage:\n${contact.message}`);
            }
        }
        
        async function viewLead(id) {
            const res = await fetch(`${API_URL}/lead`, { headers: { 'Authorization': `Bearer ${token}` } });
            const data = await res.json();
            const lead = data.data.find(l => l.id === id);
            if (lead) {
                alert(`Investor: ${lead.name}\nEmail: ${lead.email}\nPhone: ${lead.phone}\nAmount: ${lead.investment_amount}\nSector: ${lead.sector}\n\nMessage:\n${lead.message}`);
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        lucide.createIcons();
    </script>
</body>
</html>
